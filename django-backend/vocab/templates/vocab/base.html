<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Transparent Input{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-base-100">
  <header class="border-b border-base-200">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="font-semibold text-base-content">Transparent Input</a>
      <nav class="flex gap-4 text-sm">
        {% if user.is_authenticated %}
          <a href="/profile/" class="text-base-content/70 hover:text-base-content">Profile</a>
          <form method="post" action="/logout/" class="inline">{% csrf_token %}<button type="submit" class="text-base-content/70 hover:text-base-content cursor-pointer">Log out</button></form>
        {% else %}
          <a href="/login/" class="text-base-content/70 hover:text-base-content">Log in</a>
          <a href="/register/" class="text-base-content/70 hover:text-base-content">Register</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
