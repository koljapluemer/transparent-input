{% extends "vocab/base.html" %}
{% block title %}Log in — Transparent Input{% endblock %}
{% block content %}
<div class="max-w-sm">
  <h1 class="text-xl font-semibold mb-6">Log in</h1>
  <form method="post" class="flex flex-col gap-2">
    {% csrf_token %}
    {% if form.non_field_errors %}
      <div class="alert alert-error text-sm mb-2">{{ form.non_field_errors }}</div>
    {% endif %}
    <fieldset class="fieldset">
      <legend class="fieldset-legend">Email</legend>
      <input name="username" type="email" class="input w-full" autocomplete="email" />
    </fieldset>
    <fieldset class="fieldset">
      <legend class="fieldset-legend">Password</legend>
      <input name="password" type="password" class="input w-full" autocomplete="current-password" />
    </fieldset>
    <button type="submit" class="btn btn-primary mt-2">Log in</button>
  </form>
  <p class="text-sm text-base-content/60 mt-4">No account? <a href="/register/" class="link">Register</a></p>
</div>
{% endblock %}
