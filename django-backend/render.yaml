envVarGroups:
  - name: transparent-input-shared
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"

databases:
  - name: transparent-input-db
    databaseName: transparent_input
    postgresMajorVersion: "17"
    plan: free
    region: frankfurt

services:
  - type: keyvalue
    name: transparent-input-redis
    plan: free
    region: frankfurt
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: transparent-input-web
    runtime: python
    region: frankfurt
    rootDir: django-backend
    buildCommand: uv sync && uv run python manage.py collectstatic --noinput
    preDeployCommand: uv run python manage.py migrate
    startCommand: uv run gunicorn backend.wsgi --bind 0.0.0.0:$PORT --workers 2
    healthCheckPath: /api/
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
      - fromGroup: transparent-input-shared
      - key: DATABASE_URL
        fromDatabase:
          name: transparent-input-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: transparent-input-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        sync: false

  - type: worker
    name: transparent-input-worker
    runtime: python
    region: frankfurt
    rootDir: django-backend
    buildCommand: uv sync
    startCommand: uv run python manage.py install_argos_models && uv run celery -A backend worker -Q vps -c 2 --loglevel=info
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
      - fromGroup: transparent-input-shared
      - key: DATABASE_URL
        fromDatabase:
          name: transparent-input-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: transparent-input-redis
          property: connectionString
