app = "transparent-input"
primary_region = "fra"

[build]

[deploy]
release_command = "uv run python manage.py migrate"

[env]
DEBUG = "false"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 1

  [http_service.checks]
  grace_period = "10s"
  interval = "30s"
  timeout = "5s"
  path = "/api/"

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"
